version: '3.8'

services:
  # MongoDB service
  mongodb:
    image: mongo:6.0-jammy
    container_name: civicmind-mongodb
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - civicmind-network

  # Express Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civicmind-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/civicmind
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - mongodb
    networks:
      - civicmind-network

  # React Frontend (Nginx web server proxying backend requests)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civicmind-frontend
    restart: always
    ports:
      - '5173:80'
    depends_on:
      - backend
    networks:
      - civicmind-network

volumes:
  mongo-data:
    driver: local
  uploads-data:
    driver: local

networks:
  civicmind-network:
    driver: bridge
